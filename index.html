<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pacman Mobile</title>
<style>
  body { margin:0; background:black; color:white; text-align:center; }
  canvas { display:block; margin:auto; background:black; }

  button {
    padding:10px 20px;
    font-size:16px;
    margin:10px;
  }

  /* スマホ用コントローラー */
  .controls {
    width:200px;
    margin:20px auto;
    display:grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap:5px;
  }

  .btn {
    background:#333;
    color:white;
    font-size:20px;
    border:none;
    border-radius:10px;
  }

  .btn:active {
    background:#777;
  }
</style>
</head>
<body>

<h2>Pacman風ゲーム</h2>
<p id="score">Score: 0</p>

<button id="startBtn">ゲーム開始</button>

<canvas id="game" width="420" height="420"></canvas>

<!-- スマホ操作 -->
<div class="controls">
  <div></div>
  <button class="btn" onclick="setDir(0,-1)">↑</button>
  <div></div>

  <button class="btn" onclick="setDir(-1,0)">←</button>
  <div></div>
  <button class="btn" onclick="setDir(1,0)">→</button>

  <div></div>
  <button class="btn" onclick="setDir(0,1)">↓</button>
  <div></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 20;

let score = 0;
let gameOver = true;
let gameStarted = false;

const originalMap = [
"111111111111111111111",
"122222222122222222221",
"121111122121111122121",
"122222222222222222221",
"121111121111121111121",
"122222122222122222221",
"111121121111121121111",
"000021122222211210000",
"111121121111121121111",
"122222122222122222221",
"121111121111121111121",
"122222222122222222221",
"121111122121111122121",
"122222222222222222221",
"111111111111111111111"
];

let map, player, ghosts;

function init() {
  map = originalMap.map(row => row.split("").map(Number));
  player = { x: 1, y: 1, dirX: 0, dirY: 0 };
  ghosts = [
    { x: 10, y: 7 },
    { x: 9, y: 7 }
  ];
  score = 0;
  document.getElementById("score").innerText = "Score: 0";
  gameOver = false;
}

document.getElementById("startBtn").addEventListener("click", () => {
  init();
  gameStarted = true;
});

let ghostTimer = 0;
let ghostSpeed = 10; // 数字を大きくすると遅くなる
  
// ★スマホ用方向操作
function setDir(dx, dy) {
  if (!gameStarted) return;
  player.dirX = dx;
  player.dirY = dy;
}

// キーボード（PC用）
document.addEventListener("keydown", e => {
  if (!gameStarted) return;
  if (e.key === "ArrowUp") setDir(0,-1);
  if (e.key === "ArrowDown") setDir(0,1);
  if (e.key === "ArrowLeft") setDir(-1,0);
  if (e.key === "ArrowRight") setDir(1,0);
});

function isWall(x, y) {
  return map[y] && map[y][x] === 1;
}

function update() {
  if (!gameStarted || gameOver) return;

  let nx = player.x + player.dirX;
  let ny = player.y + player.dirY;

  if (!isWall(nx, ny)) {
    player.x = nx;
    player.y = ny;
  }

  if (map[player.y][player.x] === 2) {
    map[player.y][player.x] = 0;
    score += 10;
    document.getElementById("score").innerText = "Score: " + score;
  }

ghostTimer++;

if (ghostTimer % ghostSpeed === 0) {
  ghosts.forEach(g => {
    let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    let valid = dirs.filter(d => !isWall(g.x+d[0], g.y+d[1]));
    let move = valid[Math.floor(Math.random()*valid.length)];
    g.x += move[0];
    g.y += move[1];
  });
}
  
  ghosts.forEach(g => {
    if (g.x === player.x && g.y === player.y) {
      gameOver = true;
      alert("ゲームオーバー！");
    }
  });

  if (map.flat().every(v => v !== 2)) {
    gameOver = true;
    alert("クリア！");
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!gameStarted) {
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("ボタンを押して開始", 110, 200);
    return;
  }

  for (let y=0; y<map.length; y++) {
    for (let x=0; x<map[y].length; x++) {
      let tile = map[y][x];

      if (tile === 1) {
        ctx.fillStyle = "blue";
        ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
      }

      if (tile === 2) {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x*tileSize+10, y*tileSize+10, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(player.x*tileSize+10, player.y*tileSize+10, 8, 0.2*Math.PI, 1.8*Math.PI);
  ctx.lineTo(player.x*tileSize+10, player.y*tileSize+10);
  ctx.fill();

  ctx.fillStyle = "red";
  ghosts.forEach(g => {
    ctx.beginPath();
    ctx.arc(g.x*tileSize+10, g.y*tileSize+10, 8, 0, Math.PI*2);
    ctx.fill();
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
