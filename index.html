<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pacman 完全版</title>
<style>
  body { margin:0; background:black; color:white; text-align:center; }
  canvas { display:block; margin:auto; background:black; }

  button {
    padding:10px 20px;
    font-size:16px;
    margin:5px;
  }

  .controls {
    width:200px;
    margin:20px auto;
    display:grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap:5px;
  }

  .btn {
    background:#333;
    color:white;
    font-size:20px;
    border:none;
    border-radius:10px;
  }

  .btn:active { background:#777; }
</style>
</head>
<body>

<h2>Pacman風ゲーム（完全版）</h2>
<p id="score">Score: 0</p>

<button id="startBtn">ゲーム開始</button>
<button onclick="togglePause()">一時停止</button>

<canvas id="game" width="420" height="420"></canvas>

<div class="controls">
  <div></div>
  <button class="btn" onclick="setDir(0,-1)">↑</button>
  <div></div>

  <button class="btn" onclick="setDir(-1,0)">←</button>
  <div></div>
  <button class="btn" onclick="setDir(1,0)">→</button>

  <div></div>
  <button class="btn" onclick="setDir(0,1)">↓</button>
  <div></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 20;

let score, gameStarted, gameOver, paused;
let moveTimer, ghostTimer;

let powerMode, powerTimer;
let mouth;

let player, ghosts, map;

const moveSpeed = 8;
const ghostSpeed = 12;

// マップ（3＝パワーエサ）
const originalMap = [
"111111111111111111111",
"132222222122222222231",
"121111122121111122121",
"122222222222222222221",
"121111121111121111121",
"122222122222122222221",
"111121121111121221111",
"000021122222211210000",
"111121121111121121111",
"122222122222122222221",
"121111121111121111121",
"122222222122222222221",
"121111122121111122121",
"132222222222222222231",
"111111111111111111111"
];

// 初期化
function init() {
  map = originalMap.map(row => row.split("").map(Number));

  player = {
    x: 1, y: 1,
    dirX: 0, dirY: 0,
    nextDirX: 0, nextDirY: 0
  };

  ghosts = [
    { x: 10, y: 7 },
    { x: 9, y: 7 }
  ];

  score = 0;
  gameOver = false;
  paused = false;

  moveTimer = 0;
  ghostTimer = 0;

  powerMode = false;
  powerTimer = 0;

  mouth = 0;

  document.getElementById("score").innerText = "Score: 0";
}

// スタート
document.getElementById("startBtn").onclick = () => {
  init();
  gameStarted = true;
};

// 一時停止
function togglePause() {
  paused = !paused;
}

// 操作
function setDir(dx, dy) {
  if (!gameStarted) return;
  player.nextDirX = dx;
  player.nextDirY = dy;
}

document.addEventListener("keydown", e => {
  if (!gameStarted) return;
  if (e.key === "ArrowUp") setDir(0,-1);
  if (e.key === "ArrowDown") setDir(0,1);
  if (e.key === "ArrowLeft") setDir(-1,0);
  if (e.key === "ArrowRight") setDir(1,0);
});

// 壁判定
function isWall(x, y) {
  return map[y] && map[y][x] === 1;
}

// 更新
function update() {
  if (!gameStarted || gameOver || paused) return;

  moveTimer++;

  // プレイヤー移動
  if (moveTimer % moveSpeed === 0) {

    let nx = player.x + player.nextDirX;
    let ny = player.y + player.nextDirY;

    if (!isWall(nx, ny)) {
      player.dirX = player.nextDirX;
      player.dirY = player.nextDirY;
    }

    nx = player.x + player.dirX;
    ny = player.y + player.dirY;

    if (!isWall(nx, ny)) {
      player.x = nx;
      player.y = ny;
    }

    // ワープ
    if (player.x < 0) player.x = map[0].length - 1;
    if (player.x >= map[0].length) player.x = 0;

    // エサ
    if (map[player.y][player.x] === 2) {
      map[player.y][player.x] = 0;
      score += 10;
    }

    // パワーエサ
    if (map[player.y][player.x] === 3) {
      map[player.y][player.x] = 0;
      powerMode = true;
      powerTimer = 300;
    }

    document.getElementById("score").innerText = "Score: " + score;
  }

  // パワーモード
  if (powerMode) {
    powerTimer--;
    if (powerTimer <= 0) powerMode = false;
  }

  // ゴースト移動
  ghostTimer++;
  if (ghostTimer % ghostSpeed === 0) {
    ghosts.forEach(g => {

      let dx = player.x - g.x;
      let dy = player.y - g.y;

      let options = [];

      if (Math.abs(dx) > Math.abs(dy)) {
        options.push([Math.sign(dx), 0]);
        options.push([0, Math.sign(dy)]);
      } else {
        options.push([0, Math.sign(dy)]);
        options.push([Math.sign(dx), 0]);
      }

      options = options.concat([[1,0],[-1,0],[0,1],[0,-1]]);

      let move = options.find(d => !isWall(g.x+d[0], g.y+d[1]));
      if (move) {
        g.x += move[0];
        g.y += move[1];
      }
    });
  }

  // 衝突
  ghosts.forEach(g => {
    if (g.x === player.x && g.y === player.y) {
      if (powerMode) {
        g.x = 10;
        g.y = 7;
        score += 50;
      } else {
        gameOver = true;
        alert("ゲームオーバー！");
      }
    }
  });

  // クリア
  if (map.flat().every(v => v !== 2 && v !== 3)) {
    gameOver = true;
    alert("クリア！");
  }

  // アニメーション
  mouth += 0.2;
}

// 描画
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!gameStarted) {
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("ボタンを押して開始", 110, 200);
    return;
  }

  for (let y=0; y<map.length; y++) {
    for (let x=0; x<map[y].length; x++) {

      if (map[y][x] === 1) {
        ctx.fillStyle = "blue";
        ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
      }

      if (map[y][x] === 2) {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x*tileSize+10, y*tileSize+10, 3, 0, Math.PI*2);
        ctx.fill();
      }

      if (map[y][x] === 3) {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x*tileSize+10, y*tileSize+10, 6, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // プレイヤー（口アニメ）
  let open = Math.abs(Math.sin(mouth)) * 0.4;
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(
    player.x*tileSize+10,
    player.y*tileSize+10,
    8,
    open*Math.PI,
    (2-open)*Math.PI
  );
  ctx.lineTo(player.x*tileSize+10, player.y*tileSize+10);
  ctx.fill();

  // ゴースト
  ghosts.forEach(g => {
    ctx.fillStyle = powerMode ? "blue" : "red";
    ctx.beginPath();
    ctx.arc(g.x*tileSize+10, g.y*tileSize+10, 8, 0, Math.PI*2);
    ctx.fill();
  });
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
